services:
  nuxt-admin-ui:
    build:
      context: .
      dockerfile: docker/dev/nuxt.dockerfile
    container_name: nuxt-admin-ui-dev
    working_dir: /app
    volumes:
      - ./nuxt-app:/app              # your source code
      - nuxt_admin_node_modules:/app/node_modules  # keep deps in container volume
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "3000:3000"
    networks:
      - proxy_network
    environment:
      - HOST=0.0.0.0
      - CHOKIDAR_USEPOLLING=true
      - BEAMS_INSTANCE_ID=e1944000-0a47-4005-9ac3-1f0480b9ae16

  nginx:
    image: nginx:latest
    container_name: nuxt-admin-ui-nginx
    ports:
      - "82:80"
    volumes:
      - ./docker/dev/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - nuxt-admin-ui
    networks:
      - proxy_network

networks:
  proxy_network:

volumes:
  nuxt_admin_node_modules:
