services:
  nuxt-admin-ui:
    build:
      context: .
      dockerfile: docker/dev/nuxt.dockerfile
    container_name: nuxt-admin-ui-dev
    working_dir: /app
    volumes:
      - ./nuxt-app:/app
      - /app/node_modules 
    command: sh -c "npm install && npx nuxt dev"
    ports:
      - "3000:3000"
    networks:
      - proxy_network
    environment:
      - HOST=0.0.0.0
      - CHOKIDAR_USEPOLLING=true

  nginx:
    image: nginx:latest
    container_name: nuxt-admin-ui-nginx
    ports:
      - "82:80"
    volumes:
      - ./docker/dev/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - nuxt-admin-ui
    networks:
      - proxy_network

networks:
  proxy_network:
