services:
  nuxt:
    image: node:20-alpine
    container_name: nuxt-dev
    working_dir: /app
    volumes:
      - ./nuxt-app:/app
    command: sh -c "npm install && npx nuxt dev"

    ports:
      - "3000:3000" # Port exposed directly to your host
    networks:
      - proxy_network
    environment:
      - HOST=0.0.0.0
      - CHOKIDAR_USEPOLLING=true

  nginx:
    image: nginx:latest
    container_name: nuxt-nginx
    ports:
      - "82:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - nuxt
    networks:
      - proxy_network

networks:
  proxy_network:
