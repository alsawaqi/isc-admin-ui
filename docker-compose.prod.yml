services:
  nuxt:
    build:
      context: ./nuxt-app
      dockerfile: ../docker/prod/nuxt.dockerfile
    container_name: nuxt-ssr
    restart: always
    networks:
      - npm_network
    environment:
      NODE_ENV: production

  nginx:
    image: nginx:alpine
    container_name: nuxt-nginx-prod
    volumes:
      - ./docker/prod/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - nuxt
    networks:
      - npm_network

networks:
  npm_network:
    external: true
